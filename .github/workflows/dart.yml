# separate terms of service, privacy policy, and support
# documentation.

name: Flutter CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Add this step here to satisfy the asset compiler
      - name: Create dummy .env file
        run: touch .env

      # Sets up the Flutter SDK
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable' # Use 'stable' for production-ready code
          # flutter-version: '3.19.0' # Optional: pin to a specific version

      - name: Install dependencies
        run: flutter pub get

      # Optional: Verify formatting
      # - name: Verify formatting
      #   run: dart format --output=none --set-exit-if-changed .

      - name: Analyze project source
        run: flutter analyze

      - name: Run tests
        run: flutter test
